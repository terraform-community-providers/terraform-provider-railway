fragment CustomDomain on CustomDomain {
  id
  domain
  targetPort
  status {
    dnsRecords {
      hostlabel
      requiredValue
      zone
    }
    verificationDnsHost
    verificationToken
  }
  environmentId
  serviceId
}

query listCustomDomains(
  $environmentId: String!
  $serviceId: String!
  $projectId: String!
) {
  domains(
    environmentId: $environmentId
    serviceId: $serviceId
    projectId: $projectId
  ) {
    customDomains {
      ...CustomDomain
    }
  }
}

# @genqlient(for: "CustomDomainCreateInput.targetPort", omitempty: true, pointer: true)
mutation createCustomDomain(
  $input: CustomDomainCreateInput!
) {
  customDomainCreate(input: $input) {
    ...CustomDomain
  }
}

mutation updateCustomDomain(
  $environmentId: String!
  $id: String!
  # @genqlient(pointer: true)
  $targetPort: Int
) {
  customDomainUpdate(
    environmentId: $environmentId
    id: $id
    targetPort: $targetPort
  )
}

mutation deleteCustomDomain($id: String!) {
  customDomainDelete(id: $id)
}
